<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poseidon Comercial</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0f2a 0%, #1a1f3a 50%, #0a0f2a 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* Efeito de ondas */
        .wave-bg {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 0;
            position: relative;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 3em;
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(0,212,255,0.3);
        }

        .logo-sub {
            font-size: 0.3em;
            display: block;
            color: #7f8c8d;
        }

        .tagline {
            color: #bdc3c7;
            margin-top: 10px;
            font-size: 1.1em;
        }

        /* Cards */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
        }

        .auth-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(255,255,255,0.2);
        }

        .tab-btn {
            background: none;
            border: none;
            color: #bdc3c7;
            padding: 10px 20px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .tab-btn.active {
            color: #00d4ff;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #00d4ff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #bdc3c7;
            font-size: 0.9em;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            font-size: 1em;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(255,255,255,0.15);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .info-text {
            text-align: center;
            margin-top: 20px;
            color: #bdc3c7;
            font-size: 0.85em;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        .alert-error {
            background: rgba(231,76,60,0.2);
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }

        .alert-success {
            background: rgba(46,204,113,0.2);
            border: 1px solid #2ecc71;
            color: #2ecc71;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 40px 0;
            color: #7f8c8d;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .logo { font-size: 2em; }
            .auth-card { margin: 20px; padding: 30px; }
        }
    </style>
</head>
<body>
    <canvas class="wave-bg" id="waveCanvas"></canvas>
    
    <div class="container">
        <div class="header">
            <div class="logo">
                POSEIDON
                <span class="logo-sub">COMMERCIAL</span>
            </div>
            <div class="tagline">Sistema Inteligente de Monitoramento de Aquários</div>
        </div>

        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-tabs">
                    <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                    <button class="tab-btn" onclick="switchTab('register')">Cadastro</button>
                </div>

                <div id="loginTab" class="tab-content active">
                    <form id="loginForm">
                        <div class="form-group">
                            <label>📧 E-mail</label>
                            <input type="email" id="loginEmail" required placeholder="seu@email.com">
                        </div>
                        <div class="form-group">
                            <label>🔒 Senha</label>
                            <input type="password" id="loginPassword" required placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn">Entrar no Sistema</button>
                        <div class="info-text">
                            🔐 Acesso seguro via Firebase Authentication
                        </div>
                    </form>
                </div>

                <div id="registerTab" class="tab-content">
                    <form id="registerForm">
                        <div class="form-group">
                            <label>👤 Nome Completo</label>
                            <input type="text" id="regName" required placeholder="Seu nome">
                        </div>
                        <div class="form-group">
                            <label>📧 E-mail</label>
                            <input type="email" id="regEmail" required placeholder="seu@email.com">
                        </div>
                        <div class="form-group">
                            <label>🔒 Senha</label>
                            <input type="password" id="regPassword" required placeholder="Mínimo 6 caracteres">
                        </div>
                        <div class="form-group">
                            <label>🔑 ID do Dispositivo ESP32</label>
                            <input type="text" id="regDeviceId" placeholder="Ex: 2C3A4B5C6D7E8F90">
                        </div>
                        <button type="submit" class="btn">Criar Conta</button>
                        <div class="info-text">
                            📡 Após cadastro, você poderá monitorar seu aquário de qualquer lugar
                        </div>
                    </form>
                </div>

                <div id="alert" class="alert"></div>
            </div>
        </div>

        <div class="footer">
            <p>© 2024 Poseidon Comercial - Tecnologia em Monitoramento de Aquários</p>
            <p>Sistema em Tempo Real com Firebase</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script>
        // Configuração do Firebase - Substitua pelos dados do seu projeto
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "seu-projeto.firebaseapp.com",
            databaseURL: "https://seu-projeto.firebaseio.com",
            projectId: "seu-projeto",
            storageBucket: "seu-projeto.appspot.com",
            messagingSenderId: "seu-sender-id",
            appId: "seu-app-id"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // Efeito de ondas no background
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        function drawWaves() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0a0f2a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const time = Date.now() / 1000;
            
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(0, canvas.height);
                
                for (let x = 0; x <= canvas.width; x += 50) {
                    const y = canvas.height - 100 - 
                              Math.sin(x * 0.005 + time + i) * 30 -
                              Math.cos(x * 0.01 + time * 0.7 + i) * 20;
                    ctx.lineTo(x, y);
                }
                
                ctx.lineTo(canvas.width, canvas.height);
                ctx.fillStyle = `rgba(0, 180, 255, ${0.05 - i * 0.015})`;
                ctx.fill();
            }
            
            requestAnimationFrame(drawWaves);
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        drawWaves();

        // Funções de UI
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab-btn');
            const contents = document.querySelectorAll('.tab-content');
            
            tabs.forEach(t => t.classList.remove('active'));
            contents.forEach(c => c.classList.remove('active'));
            
            if (tab === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('loginTab').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('registerTab').classList.add('active');
            }
            
            hideAlert();
        }

        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type} show`;
            setTimeout(() => {
                alertDiv.classList.remove('show');
            }, 5000);
        }

        function hideAlert() {
            const alertDiv = document.getElementById('alert');
            alertDiv.classList.remove('show');
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Verificar se usuário tem dispositivos associados
                const userDevices = await database.ref(`users/${user.uid}/devices`).once('value');
                
                if (userDevices.exists()) {
                    // Salvar dados do usuário
                    localStorage.setItem('poseidon_user', JSON.stringify({
                        uid: user.uid,
                        email: user.email,
                        devices: userDevices.val()
                    }));
                    
                    // Redirecionar para dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    showAlert('Nenhum dispositivo encontrado. Adicione um dispositivo na área administrativa.', 'error');
                }
            } catch (error) {
                showAlert('Erro no login: ' + error.message, 'error');
            }
        });

        // Registro
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const deviceId = document.getElementById('regDeviceId').value;
            
            if (password.length < 6) {
                showAlert('A senha deve ter no mínimo 6 caracteres', 'error');
                return;
            }
            
            try {
                // Criar usuário no Firebase Auth
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Salvar dados do usuário no Realtime Database
                await database.ref(`users/${user.uid}/profile`).set({
                    name: name,
                    email: email,
                    created_at: Date.now()
                });
                
                // Adicionar dispositivo se fornecido
                if (deviceId && deviceId.trim() !== '') {
                    await database.ref(`users/${user.uid}/devices/${deviceId}`).set({
                        name: "Meu Aquário",
                        added_at: Date.now(),
                        active: true
                    });
                    
                    // Atualizar permissões do dispositivo
                    await database.ref(`devices/${deviceId}/owner`).set(user.uid);
                    await database.ref(`devices/${deviceId}/permissions/${user.uid}`).set({
                        role: "owner",
                        granted_at: Date.now()
                    });
                }
                
                showAlert('Cadastro realizado com sucesso! Faça login para continuar.', 'success');
                
                // Limpar formulário e mudar para login
                document.getElementById('regName').value = '';
                document.getElementById('regEmail').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('regDeviceId').value = '';
                switchTab('login');
                
            } catch (error) {
                showAlert('Erro no cadastro: ' + error.message, 'error');
            }
        });
    </script>
</body>
</html>
